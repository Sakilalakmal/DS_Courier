name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint_typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint + Typecheck
        run: npm run lint && npm run typecheck

  unit_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Unit tests
        run: npm run test:unit

  integration_smoke:
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: YourStrong!Passw0rd
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong!Passw0rd -Q 'SELECT 1' -C"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: sqlserver://localhost:1433;database=CourierFlow;user=sa;password=YourStrong!Passw0rd;encrypt=true;trustServerCertificate=true
      BETTER_AUTH_SECRET: ci-local-secret
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3000
      JWT_SECRET: ci-jwt-secret
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      REDIS_URL: redis://localhost:6379
      MAILHOG_HOST: localhost
      MAILHOG_PORT: 1025
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Prisma deploy
        run: npm run prisma:deploy

      - name: Integration tests
        run: npm run test:integration
