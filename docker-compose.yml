services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrong!Passw0rd", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - sqlserver_data:/var/opt/mssql

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    profiles: ["fullstack"]
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm run dev --workspace @courierflow/api"
    env_file:
      - .env
    environment:
      BETTER_AUTH_URL: http://web:3000
      DATABASE_URL: sqlserver://sqlserver:1433;database=CourierFlow;user=sa;password=YourStrong!Passw0rd;encrypt=true;trustServerCertificate=true
    volumes:
      - ./:/workspace
    ports:
      - "4000:4000"
    depends_on:
      sqlserver:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started

  web:
    profiles: ["fullstack"]
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm run dev --workspace @courierflow/web"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlserver://sqlserver:1433;database=CourierFlow;user=sa;password=YourStrong!Passw0rd;encrypt=true;trustServerCertificate=true
      NEXT_PUBLIC_API_URL: http://api:4000
      BETTER_AUTH_URL: http://web:3000
    volumes:
      - ./:/workspace
    ports:
      - "3000:3000"
    depends_on:
      sqlserver:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  sqlserver_data:
  kafka_data:
